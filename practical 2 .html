<!DOCTYPE html>
<html>
<head>
  <title>Fruits List</title>
</head>
<body>

<h2>Unordered List of Fruits</h2>
<ul>
  <li>Apple</li>
  <li>Banana</li>
  <li>Mango</li>
  <li>Orange</li>
  <li>Grapes</li>
</ul>

<h2>Ordered List of Fruits</h2>
<ol>
  <li>Apple</li>
  <li>Banana</li>
  <li>Mango</li>
  <li>Orange</li>
  <li>Grapes</li>
</ol>

</body>
</html>
