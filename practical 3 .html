<!DOCTYPE html>
<html>
<head>
<title>Fruit List</title>
<style>
ol, ul {
  display: flex;
  gap: 30px;
}

img {
  width: 150px;   /* bigger image size */
}
</style>
</head>

<body>

<h2>Ordered List</h2>
<ol>
  <li>Apple <br><img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"></li>
  <li>Banana <br><img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg"></li>
  <li>Mango <br><img src="https://upload.wikimedia.org/wikipedia/commons/9/90/Hapus_Mango.jpg"></li>
</ol>

<h2>Unordered List</h2>
<ul>
  <li>Apple <br><img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"></li>
  <li>Banana <br><img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Banana-Single.jpg"></li>
  <li>Mango <br><img src="https://upload.wikimedia.org/wikipedia/commons/9/90/Hapus_Mango.jpg"></li>
</ul>

</body>
</html>
