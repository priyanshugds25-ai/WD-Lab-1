<!DOCTYPE html>
<html>
<head>
<title>Seminar Registration</title>
</head>

<body>

<h1>College Seminar 2026</h1>
<h2>Participant Registration Form</h2>
<p>Please fill the form below to register for the seminar.</p>

<form>

<label>Full Name:</label><br>
<input type="text" name="name"><br><br>

<label>Email:</label><br>
<input type="email" name="email"><br><br>

<label>Phone Number:</label><br>
<input type="text" name="phone"><br><br>

<label>College Name:</label><br>
<input type="text" name="college"><br><br>

<label>Course:</label><br>
<input type="text" name="course"><br><br>

<label>Year:</label><br>
<select>
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Final Year</option>
</select>
<br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male<br>
<input type="radio" name="gender"> Female<br>
<input type="radio" name="gender"> Other<br><br>

<label>Topics Interested In:</label><br>
<input type="checkbox"> Artificial Intelligence<br>
<input type="checkbox"> Web Development<br>
<input type="checkbox"> Cyber Security<br><br>

<input type="submit" value="Register">
<input type="reset" value="Clear">

</form>

</body>
</html>
